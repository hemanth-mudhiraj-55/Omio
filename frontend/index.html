      <p><strong>Evalixa AI - AI Benchmarking, Evaluation &amp; Security</strong></p>
      <p>We started Evalixa because we kept seeing the same problem: organisations adopting AI systems that were never properly tested, evaluated, or secured before reaching production. Evalixa AI is a technology services company focused on AI evaluation, security testing, and enterprise AI systems. We keep our client list small on purpose. Every project gets senior practitioners who stay involved from the first conversation to the final delivery.</p>
      <h2>What We Do</h2>
      <ul>
        <li>AI Agent Evaluation &amp; Benchmarking - structured quality measurement for AI systems</li>
        <li>AI Model Security Testing - adversarial testing and vulnerability assessment for AI models</li>
        <li>AI Attack Detection Systems - real-time detection and defense against adversarial inputs and prompt injection</li>
        <li>Data Annotation - high-quality domain-specific data labeling for model training and RLHF pipelines</li>
        <li>Enterprise AI Agents - production-ready AI workflows with governance and audit controls</li>
      </ul>
      <h2>Why Evalixa AI</h2>
      <p>We are at the beginning of our journey — but our standards are not. No handoffs. No junior replacements halfway through. Just people who take the problem as seriously as you do. We work with startups, scale-ups, and enterprise teams across Europe, Asia, and North America that need specialist AI capability fast.</p>
